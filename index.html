<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bänneripigistaja</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="splash">
    <iframe id="splash-frame" scrolling="no" frameborder="0"></iframe>
  </div>

  <div id="app">
    <img src="assets/onu-sano-logo.svg" id="logo" alt="Onu Sano logo" draggable="false">

    <div id="drop-zone" role="button" tabindex="0" aria-label="Kliki või lohista bänneripildid siia">
      <svg id="drop-border" aria-hidden="true">
        <rect id="dash-rect" x="2" y="2" rx="16" ry="16"/>
      </svg>

      <div id="empty-state" class="zone-layer">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2"/>
          <polyline points="16 11 12 7 8 11"/>
          <line x1="12" y1="7" x2="12" y2="17"/>
        </svg>
        <span>Lohista siia need neetud bännerid!</span>
      </div>

      <div id="files-ready" class="zone-layer hidden">
        <span id="files-label"></span>
      </div>


    </div>

    <button id="compress-btn" type="button">
      <span class="btn-shadow"></span>
      <span class="btn-face">Pigista bännerid</span>
    </button>

    <div id="error-bubble" aria-hidden="true">
      <img src="assets/error-bubble.svg" alt="" width="172" height="82">
    </div>
  </div>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <input id="file-input" type="file" multiple
         accept=".jpg,.jpeg,.png,.gif,.bmp,.tiff,.tif,.webp,.heic"
         style="display:none">

  <!-- Auth button -->
  <button id="auth-btn" type="button" aria-label="Logi sisse" title="Logi sisse">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
  </button>

  <!-- Logged-in dropdown -->
  <div id="auth-dropdown" class="hidden">
    <p id="dropdown-email"></p>
    <a href="admin/" id="dropdown-admin">Admin</a>
    <button id="dropdown-logout" type="button">Logi välja</button>
  </div>

  <!-- Auth modal (login / register only) -->
  <div id="auth-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="auth-modal">
      <button id="auth-close" type="button" aria-label="Sulge">&times;</button>

      <div id="auth-login-view">
        <h2 class="auth-heading">Konto</h2>
        <div id="auth-tabs">
          <button class="auth-tab active" data-tab="login" type="button">Logi sisse</button>
          <button class="auth-tab" data-tab="register" type="button">Registreeru</button>
        </div>
        <form id="auth-form" novalidate>
          <input type="email"    id="auth-email"    placeholder="E-post" required autocomplete="email">
          <input type="password" id="auth-password" placeholder="Parool" required autocomplete="current-password">
          <button type="submit"  id="auth-submit">Logi sisse</button>
        </form>
        <p id="auth-message"></p>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
